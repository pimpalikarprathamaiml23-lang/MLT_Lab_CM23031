<!DOCTYPE html>
<html>
<head>
  <title>MLT - Train CNN on MNIST (Fixed)</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
</head>
<body>
  <h2>Part 1: Train CNN on MNIST (5 Epochs)</h2>
  <button onclick="trainCNN()">Train CNN</button>
  <p>Open Console (F12) to see accuracy</p>

  <script>
    const IMAGE_SIZE = 28 * 28;
    const NUM_CLASSES = 10;
    const NUM_DATASET_ELEMENTS = 65000;
    const TRAIN_SIZE = 55000;
    const TEST_SIZE = 10000;

    const MNIST_IMAGES_SPRITE_PATH =
      'https://storage.googleapis.com/learnjs-data/model-builder/mnist_images.png';
    const MNIST_LABELS_PATH =
      'https://storage.googleapis.com/learnjs-data/model-builder/mnist_labels_uint8';

    let datasetImages;
    let datasetLabels;

    async function loadMnistData() {
      const img = new Image();
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const imgRequest = new Promise((resolve) => {
        img.crossOrigin = '';
        img.onload = () => resolve();
        img.src = MNIST_IMAGES_SPRITE_PATH;
      });

      const labelsRequest = fetch(MNIST_LABELS_PATH);
      await Promise.all([imgRequest, labelsRequest]);

      const labelsResponse = await labelsRequest;
      datasetLabels = new Uint8Array(await labelsResponse.arrayBuffer());

      const { width, height } = img;
      const chunkSize = 5000;
      canvas.width = width;
      canvas.height = chunkSize;

      const datasetBytesBuffer = new ArrayBuffer(NUM_DATASET_ELEMENTS * IMAGE_SIZE * 4);

      for (let i = 0; i < NUM_DATASET_ELEMENTS / chunkSize; i++) {
        const datasetBytesView = new Float32Array(
          datasetBytesBuffer,
          i * IMAGE_SIZE * chunkSize * 4,
          IMAGE_SIZE * chunkSize
        );

        ctx.drawImage(
          img,
          0,
          i * chunkSize,
          width,
          chunkSize,
          0,
          0,
          width,
          chunkSize
        );

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        for (let j = 0; j < imageData.data.length / 4; j++) {
          datasetBytesView[j] = imageData.data[j * 4] / 255;
        }
      }

      datasetImages = new Float32Array(datasetBytesBuffer);

      const trainImages = datasetImages.slice(0, IMAGE_SIZE * TRAIN_SIZE);
      const testImages = datasetImages.slice(IMAGE_SIZE * TRAIN_SIZE);

      const trainLabels = datasetLabels.slice(0, NUM_CLASSES * TRAIN_SIZE);
      const testLabels = datasetLabels.slice(NUM_CLASSES * TRAIN_SIZE);

      return {
        trainImages,
        testImages,
        trainLabels,
        testLabels
      };
    }

    async function trainCNN() {
      const { trainImages, trainLabels, testImages, testLabels } = await loadMnistData();

      const xTrain = tf.tensor4d(trainImages, [TRAIN_SIZE, 28, 28, 1]);
      const yTrain = tf.tensor2d(trainLabels, [TRAIN_SIZE, 10]);

      const xTest = tf.tensor4d(testImages, [TEST_SIZE, 28, 28, 1]);
      const yTest = tf.tensor2d(testLabels, [TEST_SIZE, 10]);

      const model = tf.sequential();
      model.add(tf.layers.conv2d({ inputShape: [28,28,1], filters: 32, kernelSize: 3, activation: 'relu' }));
      model.add(tf.layers.maxPooling2d({ poolSize: 2 }));
      model.add(tf.layers.flatten());
      model.add(tf.layers.dense({ units: 128, activation: 'relu' }));
      model.add(tf.layers.dense({ units: 10, activation: 'softmax' }));

      model.compile({
        optimizer: 'adam',
        loss: 'categoricalCrossentropy',
        metrics: ['accuracy']
      });

      console.log("Training CNN...");

      await model.fit(xTrain, yTrain, {
        epochs: 5,
        validationData: [xTest, yTest],
        callbacks: {
          onEpochEnd: (epoch, logs) => {
            console.log(`Epoch ${epoch + 1} - Accuracy: ${logs.acc}`);
          }
        }
      });

      await model.save('localstorage://cnn-mnist');
      alert("✅ Training Completed & Model Saved!");
    }
  </script>
</body>
</html>
