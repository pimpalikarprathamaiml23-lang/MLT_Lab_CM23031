<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MNIST CNN Browser Training</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>
</head>
<body>
<h2>MNIST CNN Training (Browser)</h2>
<p>Check console (F12) for logs.</p>

<script>
(async () => {
  console.log("Creating CNN model...");

  const model = tf.sequential();
  model.add(tf.layers.conv2d({inputShape:[28,28,1], filters:16, kernelSize:3, activation:'relu'}));
  model.add(tf.layers.maxPooling2d({poolSize:2}));
  model.add(tf.layers.flatten());
  model.add(tf.layers.dense({units:64, activation:'relu'}));
  model.add(tf.layers.dense({units:10, activation:'softmax'}));

  model.compile({optimizer:'adam', loss:'categoricalCrossentropy', metrics:['accuracy']});

  console.log("Generating dummy MNIST-like data...");

  // Small random dataset for demo (10 images per class)
  const numClasses = 10;
  const numSamples = 10*numClasses;
  const xs = tf.randomUniform([numSamples,28,28,1]);
  const ys = tf.oneHot(tf.tensor1d([...Array(numClasses).keys()].flatMap(i=>Array(10).fill(i)),'int32'),10);

  console.log("Training CNN...");
  await model.fit(xs, ys, {epochs:3, batchSize:16, callbacks:{
    onEpochEnd:(epoch,logs)=>{
      console.log(`Epoch ${epoch+1}: loss=${logs.loss.toFixed(4)}, acc=${(logs.acc*100).toFixed(2)}%`);
    }
  }});

  console.log("Predicting a sample...");
  const sample = tf.randomUniform([1,28,28,1]);
  const pred = model.predict(sample).argMax(-1).dataSync()[0];
  console.log("Predicted class (random demo data):", pred);

})();
</script>
</body>
</html>
